name: Update prototype status on merge

on:
  pull_request:
    types: [closed]

jobs:
  update-status:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update mergedAt in prototypes.tsx
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGE_DATE: ${{ github.event.pull_request.merged_at }}
        run: node .github/scripts/set-merged-at.cjs

      - name: Check for changes
        id: check
        run: |
          git diff --quiet src/prototypes.tsx && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/prototypes.tsx
          git commit -m "Update prototype status: PR #${PR_NUMBER} merged"
          git push
